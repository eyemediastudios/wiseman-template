<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f9fafb"/>
  <!-- Outer walls -->
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#374151" stroke-width="4"/>
  <!-- Living Room -->
  <rect x="40" y="40" width="280" height="260" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="180" y="165" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Living Room</text>
  <!-- Kitchen -->
  <rect x="320" y="40" width="440" height="180" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="540" y="125" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Kitchen / Dining</text>
  <!-- Bedroom 1 -->
  <rect x="40" y="300" width="240" height="260" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
  <text x="160" y="425" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Bedroom 1</text>
  <!-- Bedroom 2 -->
  <rect x="280" y="300" width="200" height="260" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
  <text x="380" y="425" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Bedroom 2</text>
  <!-- Bedroom 3 -->
  <rect x="480" y="300" width="140" height="260" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
  <text x="550" y="425" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Bedroom 3</text>
  <!-- Bathroom -->
  <rect x="620" y="300" width="140" height="120" fill="#bfdbfe" stroke="#9ca3af" stroke-width="1"/>
  <text x="690" y="355" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Bathroom</text>
  <!-- Hallway -->
  <rect x="620" y="420" width="140" height="140" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="690" y="490" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Hallway</text>
  <!-- Doors (arc indicators) -->
  <path d="M 40 200 Q 20 200 20 220" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <path d="M 280 300 Q 280 280 300 280" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <path d="M 480 300 Q 480 280 500 280" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <!-- Scale bar -->
  <line x1="60" y1="575" x2="160" y2="575" stroke="#9ca3af" stroke-width="2"/>
  <line x1="60" y1="570" x2="60" y2="580" stroke="#9ca3af" stroke-width="2"/>
  <line x1="160" y1="570" x2="160" y2="580" stroke="#9ca3af" stroke-width="2"/>
  <text x="110" y="590" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">0     5m</text>
  <!-- Title -->
  <text x="400" y="20" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">Floorplan — Not to Scale</text>
</svg>
